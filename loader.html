<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
               will-change: transform; }

    .overlay {
      position: fixed; inset: 0; z-index: 20; pointer-events: none;
      display: flex; flex-direction: column; justify-content: center; padding: 0 8%;
    }
    .headline {
      font-family: 'Playfair Display', Georgia, serif; font-weight: 700;
      font-size: clamp(1.6rem, 4.5vw, 3rem); color: #ffffff; line-height: 1.25;
      max-width: 560px; opacity: 0; transform: translateY(20px);
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
      text-align: center; align-self: center;
    }
    .body-text {
      font-family: 'Lato', sans-serif; font-weight: 300;
      font-size: clamp(0.95rem, 2vw, 1.15rem); color: rgba(255,255,255,0.82);
      line-height: 1.65; max-width: 460px; margin-top: 2.8rem;
      text-align: center; align-self: center; opacity: 0; transform: translateY(20px);
      text-shadow: 0 1px 12px rgba(0,0,0,0.7);
    }
    .diamond {
      position: fixed; right: 44%; top: 12%; width: 10px; height: 10px;
      background: rgba(255,255,255,0.55); transform: rotate(45deg); z-index: 25; opacity: 0;
    }
    .dot-grid {
      position: fixed; left: 4%; top: 52%; width: 120px; height: 70px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 10px 10px; z-index: 22; opacity: 0;
    }
    .loading-dots { display: inline-flex; gap: 10px; align-items: center; margin-bottom: 1rem; }
    .loading-text {
      font-family: 'Lato', sans-serif; font-weight: 300;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.25em; text-transform: uppercase;
      animation: textPulse 2s ease-in-out infinite;
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.75; }
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.85);
      display: inline-block;
      animation: dotBounce 1.2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(180,120,255,0.6);
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      40%            { transform: translateY(-16px) scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <div class="headline" id="headline">
      <span class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
      <div class="loading-text">Loading</div>
    </div>
    
  </div>
  <div class="diamond" id="diamond"></div>
  <div class="dot-grid"  id="dotGrid"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  /* ═══════════════════════════════════════════════════════
     RENDERER / SCENE / CAMERA
  ═══════════════════════════════════════════════════════ */
  const canvas = document.getElementById('canvas');

  /* ── Renderer: power-preference high, capped pixel ratio ── */
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: window.devicePixelRatio < 2, /* skip AA on HiDPI — already sharp */
    powerPreference: 'high-performance',
    stencil: false,
    depth: true,
  });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5)); /* cap at 1.5× */
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x311b37, 1);
  renderer.info.autoReset = false; /* manual reset for perf tracking */

  /* ── GSAP lag smoothing ── */
  gsap.ticker.lagSmoothing(500, 33);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 10);

  /* ═══════════════════════════════════════════════════════
     BACKGROUND — purple radial glow matching the reference
     Deep dark navy/black edges → rich purple centre
  ═══════════════════════════════════════════════════════ */
  const bgVert = `
    varying vec2 vUv;
    void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `;
  const bgFrag = `
    precision highp float;
    uniform float uTime;
    varying vec2 vUv;
    void main(){
      vec2 uv = vUv - 0.5;
      float d = length(uv);
      float breath = 0.88 + 0.12 * sin(uTime * 0.55);

      // ── Spot size: increase numbers = smaller spot, decrease = larger ──
      float spot   = exp(-d * d * 350.0) * 1.00 * breath;
      float inner  = exp(-d * d * 160.0) * 0.65 * breath;
      float outer  = exp(-d * d *  70.0) * 0.30 * breath;

      // ── CHANGE SPOT COLORS HERE ─────────────────────────────────────
      // Background — always pure black
      vec3 col = vec3(0.0);

      // Outer ring color — #37153d
      col = mix(col, vec3(0.216, 0.082, 0.239), clamp(outer, 0.0, 1.0));

      // Mid halo color — #24064f
      col = mix(col, vec3(0.141, 0.024, 0.310), clamp(inner, 0.0, 1.0));

      // Subtle accent color — #3e028f (appears lightly, not dominant)
      float accent = exp(-d * d * 200.0) * 0.35 * breath;
      col = mix(col, vec3(0.243, 0.008, 0.561), clamp(accent, 0.0, 1.0));

      // Subtle accent color — #440492 (appears lightly, not dominant)
      float accent2 = exp(-d * d * 160.0) * 0.28 * breath;
      col = mix(col, vec3(0.267, 0.016, 0.573), clamp(accent2, 0.0, 1.0));

      // Bright core color — #461f55
      col = mix(col, vec3(0.275, 0.122, 0.333), clamp(spot,  0.0, 1.0));

      // Tightest centre color — #461f55
      float centre = exp(-d * d * 700.0) * 1.00 * breath;
      col = mix(col, vec3(0.275, 0.122, 0.333), clamp(centre, 0.0, 1.0));
      // ────────────────────────────────────────────────────────────────

      gl_FragColor = vec4(col, 1.0);
    }
  `;
  const bgMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(42, 42),
    new THREE.ShaderMaterial({ vertexShader: bgVert, fragmentShader: bgFrag,
      uniforms: { uTime: { value: 0 } }, depthWrite: false, depthTest: false })
  );
  bgMesh.position.z = -6;
  bgMesh.renderOrder = -1;
  scene.add(bgMesh);

  /* ═══════════════════════════════════════════════════════
     BUBBLE VERTEX SHADER — organic cell displacement
  ═══════════════════════════════════════════════════════ */
  const bubbleVert = `
    uniform float uTime;
    uniform float uSeed;
    uniform float uMorph;

    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec3 vOrigPos;
    varying vec3 vWorldPos;

    float h3(vec3 p){
      p = fract(p * vec3(127.1, 311.7, 74.7));
      p += dot(p, p.yzx + 19.19);
      return fract((p.x + p.y) * p.z);
    }
    float sn(vec3 p){
      vec3 i = floor(p); vec3 f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(
        mix(mix(h3(i),             h3(i+vec3(1,0,0)), f.x),
            mix(h3(i+vec3(0,1,0)), h3(i+vec3(1,1,0)), f.x), f.y),
        mix(mix(h3(i+vec3(0,0,1)), h3(i+vec3(1,0,1)), f.x),
            mix(h3(i+vec3(0,1,1)), h3(i+vec3(1,1,1)), f.x), f.y), f.z);
    }

    void main(){
      vOrigPos = position;
      float t  = uTime * 0.28 + uSeed;
      float n1 = sn(position * 1.8 + vec3(t*0.6, t*0.4, t*0.5)) * 0.17;
      float n2 = sn(position * 3.5 + vec3(t*0.3, t*0.7, t*0.2)) * 0.08;
      float n3 = sn(position * 6.0 + vec3(t*0.9, t*0.2, t*0.8)) * 0.035;
      float disp = (n1 + n2 + n3) * uMorph;

      vec3 displaced = position + normal * disp;
      vNormal   = normalize(normalMatrix * (normal + vec3(n1,n2,n3)*0.4));
      vec4 mv   = modelViewMatrix * vec4(displaced, 1.0);
      vViewDir  = normalize(-mv.xyz);
      vWorldPos = (modelMatrix * vec4(displaced,1.0)).xyz;
      gl_Position = projectionMatrix * mv;
    }
  `;

  /* ═══════════════════════════════════════════════════════
     BUBBLE FRAGMENT SHADER
     — transparent body
     — iridescent rim
     — reflects the purple centre light
  ═══════════════════════════════════════════════════════ */
  const bubbleFrag = `
    precision highp float;

    uniform float uTime;
    uniform float uOpacity;
    uniform vec3  uTint;
    uniform float uSeed;

    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec3 vOrigPos;
    varying vec3 vWorldPos;

    float hash(float n){ return fract(sin(n)*43758.5453); }
    float n3(vec3 p){
      vec3 i = floor(p); vec3 f = fract(p);
      f = f*f*(3.0-2.0*f);
      float n = i.x + i.y*157.0 + i.z*113.0;
      return mix(
        mix(mix(hash(n),      hash(n+1.0),    f.x),
            mix(hash(n+157.0),hash(n+158.0),  f.x), f.y),
        mix(mix(hash(n+113.0),hash(n+114.0),  f.x),
            mix(hash(n+270.0),hash(n+271.0),  f.x), f.y), f.z);
    }

    /* White to gray rim — no colour */
    vec3 rimGray(float t){
      return mix(vec3(0.85), vec3(0.35), t);
    }

    void main(){
      vec3 N = normalize(vNormal);
      vec3 V = normalize(vViewDir);

      float cosT = max(dot(N, V), 0.0);
      float edge = 1.0 - cosT;   /* 0=centre  1=silhouette */

      /* ── Multi-directional environment lights (all sides of page) ── */
      vec3 L_top   = normalize(vec3( 0.0,  1.0, 0.8));
      vec3 L_bot   = normalize(vec3( 0.0, -1.0, 0.8));
      vec3 L_left  = normalize(vec3(-1.0,  0.0, 0.8));
      vec3 L_right = normalize(vec3( 1.0,  0.0, 0.8));
      vec3 L_tl    = normalize(vec3(-0.7,  0.7, 0.6));
      vec3 L_br    = normalize(vec3( 0.7, -0.7, 0.6));

      /* Specular glints from each light — sharp white/gray */
      vec3  H_top   = normalize(L_top   + V);
      vec3  H_bot   = normalize(L_bot   + V);
      vec3  H_left  = normalize(L_left  + V);
      vec3  H_right = normalize(L_right + V);
      vec3  H_tl    = normalize(L_tl    + V);
      vec3  H_br    = normalize(L_br    + V);

      float sp_top   = pow(max(dot(N, H_top),   0.0), 90.0) * 0.70;
      float sp_bot   = pow(max(dot(N, H_bot),   0.0), 90.0) * 0.45;
      float sp_left  = pow(max(dot(N, H_left),  0.0), 90.0) * 0.50;
      float sp_right = pow(max(dot(N, H_right), 0.0), 90.0) * 0.50;
      float sp_tl    = pow(max(dot(N, H_tl),    0.0), 65.0) * 0.40;
      float sp_br    = pow(max(dot(N, H_br),    0.0), 65.0) * 0.35;

      float totalSpec = sp_top + sp_bot + sp_left + sp_right + sp_tl + sp_br;
      vec3  specCol   = mix(vec3(0.30), vec3(0.95), clamp(totalSpec, 0.0, 1.0));

      /* ── Transparent body — nearly invisible interior ────── */
      vec3 col = vec3(0.0);  /* fully transparent body */

      /* ── Rim: white-to-gray reflection from environment ──── */
      float rimSoft  = smoothstep(0.50, 0.92, edge);
      float rimSharp = smoothstep(0.68, 0.86, edge)
                     * smoothstep(1.00, 0.88, edge);

      col += vec3(0.12) * rimSoft  * 0.18;           /* very faint gray fringe  */
      col  = mix(col, vec3(0.35), rimSharp * 0.28);  /* subtle white rim        */

      /* ── Tight bright edge highlight — gradient #251e45 → #5c5c5e ── */
      float edgeHighlight = smoothstep(0.82, 0.94, edge)
                          * smoothstep(1.00, 0.90, edge);
      vec3 edgeInner = vec3(0.145, 0.118, 0.271); /* #251e45 */
      vec3 edgeOuter = vec3(0.361, 0.361, 0.369); /* #5c5c5e */
      vec3 edgeCol   = mix(edgeInner, edgeOuter, edgeHighlight);
      col += edgeCol * edgeHighlight * 1.2;

      /* ── Soft key light halo — top-left, diffuse glow ───── */
      vec3  keyDir  = normalize(vec3(-0.4, 0.6, 1.0));
      float keyDiff = max(dot(N, keyDir), 0.0);
      float keyHalo = pow(keyDiff, 3.5) * 0.45;
      col += mix(edgeInner, edgeOuter, keyHalo) * keyHalo * 0.55;

      /* ── Specular glints distributed across surface ─────── */
      col += specCol * clamp(totalSpec, 0.0, 1.0) * 0.80;

      /* ── Alpha: transparent body, opaque only at rim/glints  */
      float alpha = 0.04
                  + rimSoft        * 0.08
                  + rimSharp       * 0.18
                  + edgeHighlight  * 0.75
                  + keyHalo        * 0.30
                  + totalSpec      * 0.50;
      alpha = clamp(alpha * uOpacity, 0.0, 1.0);

      gl_FragColor = vec4(col, alpha);
    }
  `;

  /* ═══════════════════════════════════════════════════════
     BUBBLE FACTORY
  ═══════════════════════════════════════════════════════ */
  function makeMat(tint, seed) {
    return new THREE.ShaderMaterial({
      vertexShader:   bubbleVert,
      fragmentShader: bubbleFrag,
      uniforms: {
        uTime:    { value: 0 },
        uOpacity: { value: 0 },
        uTint:    { value: new THREE.Color(tint) },
        uSeed:    { value: seed },
        uMorph:   { value: 1.0 },
      },
      transparent: true,
      depthWrite:  false,
      side: THREE.FrontSide,
      blending: THREE.NormalBlending,
    });
  }

  /* Shared geometry — lower segments for performance, still smooth */
  const geo = new THREE.SphereGeometry(1, 64, 64);

  /* 4 bubbles at the four corners, purple-tinted */
  const defs = [
    //  x      y      z    r    tint        seed
    [  2.8,   3.5,  -1.0,  2.0, 0x3d0870,   1.1 ],
    [ -3.2,   2.8,   0.4,  1.9, 0x2a0560,   0.3 ],
    [ -2.8,  -3.2,   0.3,  2.2, 0x1a0440,   4.2 ],
    [  3.0,  -2.6,  -0.5,  2.1, 0x330560,   5.8 ],
  ];

  const floatP = [
    { dx:0.55, dy:0.45, dz:0.30, sp:0.90, ph:0.00 },
    { dx:0.42, dy:0.60, dz:0.38, sp:0.75, ph:1.57 },
    { dx:0.50, dy:0.38, dz:0.42, sp:1.00, ph:3.14 },
    { dx:0.60, dy:0.52, dz:0.28, sp:0.85, ph:4.71 },
  ];

  const meshes = [];

  defs.forEach(([x,y,z,r,tint,seed], i) => {
    const mat  = makeMat(tint, seed);
    const mesh = new THREE.Mesh(geo, mat);

    /* Start at centre (0,0) and animate outward — "born from the light" */
    mesh.position.set(0, 0, 0);
    mesh.scale.setScalar(0.01);
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    scene.add(mesh);
    meshes.push({ mesh, targetR: r, ox: x, oy: y, oz: z, fp: floatP[i] });

    /* GSAP: drift outward to final position while fading in */
    const delay = 0.3 + i * 0.25;
    gsap.to(mesh.position, { x, y, z, duration: 2.0, delay, ease: 'power2.out' });
    gsap.to(mesh.scale,    { x: r, y: r, z: r, duration: 1.8, delay, ease: 'power3.out' });
    gsap.to(mat.uniforms.uOpacity, { value: 1, duration: 1.6, delay, ease: 'power2.out' });
  });

  /* Text / UI entrance */
  gsap.to('#headline', { opacity:1, y:0, duration:1.1, delay:0.8,  ease:'power3.out' });
  gsap.to('#diamond',  { opacity:1,      duration:0.8, delay:1.5,  ease:'power2.out' });
  gsap.to('#dotGrid',  { opacity:1,      duration:1.0, delay:1.7,  ease:'power2.out' });

  /* ═══════════════════════════════════════════════════════
     RENDER LOOP — high performance
  ═══════════════════════════════════════════════════════ */
  const clock = new THREE.Clock();
  let bgFrame = 0; /* update bg uniform every 2 frames */

  (function animate(){
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    /* Background: update every other frame (changes slowly) */
    bgFrame++;
    if(bgFrame % 2 === 0) bgMesh.material.uniforms.uTime.value = t;

    meshes.forEach(({ mesh, ox, oy, oz, fp }, i) => {
      mesh.material.uniforms.uTime.value = t;

      /* Float around home position after arrival */
      const arrived = t > (0.3 + i * 0.25 + 2.0);
      if(arrived){
        mesh.position.x = ox + Math.sin(t*fp.sp       + fp.ph)       * fp.dx;
        mesh.position.y = oy + Math.sin(t*fp.sp*0.7   + fp.ph + 1.1) * fp.dy;
        mesh.position.z = oz + Math.cos(t*fp.sp*0.5   + fp.ph + 2.3) * fp.dz;
      }

      mesh.rotation.y += 0.0004 * (i%2 ? 1:-1);
      mesh.rotation.x += 0.0002 * (i%3 ? 1:-1);
      mesh.rotation.z += 0.0001 * (i%2 ?-1: 1);
    });

    /* Very subtle camera sway — cheap sin/cos */
    camera.position.x = Math.sin(t*0.05) * 0.08;
    camera.position.y = Math.cos(t*0.04) * 0.06;
    camera.lookAt(0, 0, 0);

    renderer.info.reset();
    renderer.render(scene, camera);
  })();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }, 150);
  });
  </script>
</body>
</html>
